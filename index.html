<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BingoHeikiFM</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; padding: 20px; max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; color: #333; }
        .grid-jogadores { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-top: 20px; }
        .card-jogador { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .foto-wrapper { position: relative; width: 120px; height: 120px; margin: 0 auto 15px auto; }
        .foto-jogador { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; cursor: pointer; border: 3px solid #ccc; transition: transform 0.2s; }
        .foto-jogador:hover { transform: scale(1.05); border-color: #007bff; }
        .saldo { font-size: 1.6em; font-weight: bold; margin-bottom: 15px; color: #333; }
        .controles { display: flex; gap: 8px; justify-content: center; }
        input[type="number"] { width: 110px; padding: 6px; border: 1px solid #ddd; border-radius: 6px; text-align: center; }
        button { padding: 6px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; }
        .btn-add { background-color: #2e7d32; }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <h1>BingoHeikiFM</h1>
    <div class="grid-jogadores" id="hub-jogadores"></div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" width="300" height="300"></canvas>

    <script>
        const ID_PROJETO = "layvcugosxjgaxapxoir";
        const SUPABASE_URL = "https://" + ID_PROJETO + ".supabase.co";
        const SUPABASE_KEY = "sb_publishable_2lSXqjX0BhyZQbQeWPnDZA_DDBb6L7m";
        const FOTO_PADRAO = "bingo.png";

        let jogadores = Array.from({ length: 6 }, function(_, i) {
            return { id: i + 1, foto: FOTO_PADRAO, saldo: 0 };
        });

        function renderizar() {
            const hub = document.getElementById('hub-jogadores');
            hub.innerHTML = '';

            jogadores.forEach(jog => {
                const card = document.createElement('div');
                card.className = 'card-jogador';
                card.innerHTML = `
                    <div class="foto-wrapper">
                        <img src="${jog.foto || FOTO_PADRAO}" class="foto-jogador" title="Clique para tirar foto" id="img-${jog.id}">
                    </div>
                    <div class="saldo">R$ ${Number(jog.saldo || 0).toFixed(2)}</div>
                    <div class="controles">
                        <input type="number" id="input-${jog.id}" placeholder="0" step="1">
                        <button class="btn-add" id="add-${jog.id}">Adicionar</button>
                    </div>
                `;
                hub.appendChild(card);

                document.getElementById(`img-${jog.id}`).onclick = function() { tirarFoto(jog.id); };
                document.getElementById(`add-${jog.id}`).onclick = function() { atualizarSaldo(jog.id); };
            });
        }

        async function carregarDadosNuvem() {
            try {
                const resposta = await fetch(SUPABASE_URL + "/rest/v1/jogadores?select=*&order=id.asc", {
                    headers: { 
                        "apikey": SUPABASE_KEY, 
                        "Authorization": "Bearer " + SUPABASE_KEY 
                    }
                });
                const dados = await resposta.json();
                
                if (dados && dados.length > 0) {
                    jogadores = dados;
                    renderizar();
                } else {
                    await inicializarTabelaNuvem();
                }
            } catch (err) {
                console.error("Erro ao carregar dados do Supabase:", err);
            }
        }

        async function inicializarTabelaNuvem() {
            try {
                await fetch(SUPABASE_URL + "/rest/v1/jogadores", {
                    method: 'POST',
                    headers: { 
                        "apikey": SUPABASE_KEY, 
                        "Authorization": "Bearer " + SUPABASE_KEY, 
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(jogadores)
                });
            } catch (err) {
                console.error("Erro ao inicializar registros:", err);
            }
        }

        async function enviarDadosNuvem(id) {
            try {
                const jog = jogadores.find(j => j.id === id);
                await fetch(SUPABASE_URL + "/rest/v1/jogadores?id=eq." + id, {
                    method: 'PATCH',
                    headers: { 
                        "apikey": SUPABASE_KEY, 
                        "Authorization": "Bearer " + SUPABASE_KEY, 
                        "Content-Type": "application/json" 
                    },
                    body: JSON.stringify({ foto: jog.foto, saldo: jog.saldo })
                });
            } catch (err) {
                console.error("Erro ao atualizar registro na nuvem:", err);
            }
        }

        function tirarFoto(id) {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');

            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
            .then(stream => {
                video.srcObject = stream;
                setTimeout(async () => {
                    context.drawImage(video, 0, 0, 300, 300);
                    const fotoBase64 = canvas.toDataURL('image/jpeg', 0.2);
                    stream.getTracks().forEach(track => track.stop());

                    const jog = jogadores.find(j => j.id === id);
                    jog.foto = fotoBase64;
                    
                    renderizar();
                    await enviarDadosNuvem(id);
                }, 800);
            })
            .catch(err => {
                alert("Por favor, habilite a permissão de câmera.");
            });
        }

        async function atualizarSaldo(id) {
            const campo = document.getElementById(`input-${id}`);
            const valor = parseFloat(campo.value);

            // Permite valores negativos, apenas valida se é um número válido e diferente de zero
            if (isNaN(valor) || valor === 0) return;

            const jog = jogadores.find(j => j.id === id);
            const saldoAtual = Number(jog.saldo || 0);
            
            // Soma o valor digitado (se for negativo, a soma fará a subtração automaticamente)
            jog.saldo = saldoAtual + valor;

            campo.value = '';
            renderizar();
            await enviarDadosNuvem(id);
        }

        renderizar();
        carregarDadosNuvem();

        // Atualização ajustada para 10 segundos (10000 milissegundos)
        setInterval(carregarDadosNuvem, 10000);
    </script>
</body>
</html>
