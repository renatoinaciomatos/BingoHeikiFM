<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Jogadores Coletivo</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; padding: 20px; max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; color: #333; }
        .grid-jogadores { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-top: 20px; }
        .card-jogador { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .foto-jogador { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; cursor: pointer; border: 3px solid #ccc; transition: transform 0.2s; margin-bottom: 15px; }
        .foto-jogador:hover { transform: scale(1.05); border-color: #007bff; }
        .saldo { font-size: 1.6em; font-weight: bold; margin-bottom: 15px; color: #333; }
        .controles { display: flex; gap: 8px; justify-content: center; }
        input[type="number"] { width: 90px; padding: 6px; border: 1px solid #ddd; border-radius: 6px; text-align: center; }
        button { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; }
        .btn-add { background-color: #2e7d32; }
        .btn-rem { background-color: #c62828; }
    </style>
</head>
<body>

    <h1>Painel de Pontuação Sincronizado</h1>
    <div class="grid-jogadores" id="hub-jogadores"></div>

    <!-- Conexão com as bibliotecas do Firebase -->
    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getDatabase, ref, set, onValue } from "https://gstatic.com";

        // Configuração do Banco de Dados (Use este para testar agora)
        const firebaseConfig = {
            databaseURL: "https://firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, 'jogadores');

        const fotoPadrao = "https://picsum.photos";
        let jogadores = [];

        // 1. Escuta o banco de dados em tempo real. Qualquer mudança atualiza a tela de todos.
        onValue(dbRef, (snapshot) => {
            const dados = snapshot.val();
            if (dados) {
                jogadores = dados;
            } else {
                // Cria os 6 jogadores iniciais se o banco estiver vazio
                jogadores = Array.from({ length: 6 }, (_, i) => ({ id: i + 1, foto: fotoPadrao, saldo: 0 }));
                set(dbRef, jogadores);
            }
            renderizar();
        });

        function renderizar() {
            const hub = document.getElementById('hub-jogadores');
            hub.innerHTML = '';

            jogadores.forEach(jog => {
                const card = document.createElement('div');
                card.className = 'card-jogador';
                
                // Cria a imagem e adiciona o evento de clique de forma modular
                const img = document.createElement('img');
                img.src = jog.foto;
                img.className = 'foto-jogador';
                img.title = 'Clique para alterar a foto';
                img.onclick = () => alterarFoto(jog.id);

                card.appendChild(img);
                card.innerHTML += `
                    <div class="saldo">R$ ${jog.saldo.toFixed(2)}</div>
                    <div class="controles">
                        <input type="number" id="input-${jog.id}" placeholder="0,00" step="0.01">
                        <button class="btn-add" id="add-${jog.id}">+</button>
                        <button class="btn-rem" id="rem-${jog.id}">-</button>
                    </div>
                `;
                hub.appendChild(card);

                // Vincula as funções aos botões após criar o HTML
                document.getElementById(`add-${jog.id}`).onclick = () => atualizarSaldo(jog.id, true);
                document.getElementById(`rem-${jog.id}`).onclick = () => atualizarSaldo(jog.id, false);
            });
        }

        function alterarFoto(id) {
            const novaUrl = prompt("Insira a URL da nova imagem para este jogador:");
            if (novaUrl && novaUrl.trim() !== "") {
                const jog = jogadores.find(j => j.id === id);
                jog.foto = novaUrl;
                set(dbRef, jogadores); // Salva no banco de dados
            }
        }

        function atualizarSaldo(id, somar) {
            const campo = document.getElementById(`input-${id}`);
            const valor = parseFloat(campo.value);

            if (isNaN(valor) || valor <= 0) return;

            const jog = jogadores.find(j => j.id === id);
            jog.saldo = somar ? jog.saldo + valor : jog.saldo - valor;

            campo.value = '';
            set(dbRef, jogadores); // Salva no banco de dados
        }
    </script>
</body>
</html>
