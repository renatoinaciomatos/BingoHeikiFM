<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BingoHeikiFM</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; padding: 20px; max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; color: #333; }
        .grid-jogadores { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-top: 20px; }
        .card-jogador { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .foto-wrapper { position: relative; width: 120px; height: 120px; margin: 0 auto 15px auto; }
        .foto-jogador { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; cursor: pointer; border: 3px solid #ccc; transition: transform 0.2s; }
        .foto-jogador:hover { transform: scale(1.05); border-color: #007bff; }
        .saldo { font-size: 1.6em; font-weight: bold; margin-bottom: 15px; color: #333; }
        .controles { display: flex; gap: 8px; justify-content: center; }
        input[type="number"] { width: 90px; padding: 6px; border: 1px solid #ddd; border-radius: 6px; text-align: center; }
        button { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; }
        .btn-add { background-color: #2e7d32; }
        .btn-rem { background-color: #c62828; }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <h1>BingoHeikiFM</h1>
    <div class="grid-jogadores" id="hub-jogadores"></div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" width="300" height="300"></canvas>

    <script>
        const fotoPadrao = "bingo.png";
        
        // Canal de comunicação nativo que transmite os dados entre navegadores de forma direta
        const canalSincronismo = new BroadcastChannel('bingo_heiki_canal');

        // Carrega o estado salvo da última sessão ou inicia zerado
        let jogadores = JSON.parse(localStorage.getItem('bingo_dados_persistentes')) || Array.from({ length: 6 }, (_, i) => ({ 
            id: i + 1, 
            foto: fotoPadrao, 
            saldo: 0 
        }));

        function renderizar() {
            const hub = document.getElementById('hub-jogadores');
            hub.innerHTML = '';

            jogadores.forEach(jog => {
                const card = document.createElement('div');
                card.className = 'card-jogador';
                card.innerHTML = `
                    <div class="foto-wrapper">
                        <img src="${jog.foto}" class="foto-jogador" title="Clique para tirar foto" id="img-${jog.id}">
                    </div>
                    <div class="saldo">R$ ${Number(jog.saldo).toFixed(2)}</div>
                    <div class="controles">
                        <input type="number" id="input-${jog.id}" placeholder="0,00" step="0.01">
                        <button class="btn-add" id="add-${jog.id}">Adicionar</button>
                        <button class="btn-rem" id="rem-${jog.id}">-</button>
                    </div>
                `;
                hub.appendChild(card);

                document.getElementById(`img-${jog.id}`).onclick = () => tirarFoto(jog.id);
                document.getElementById(`add-${jog.id}`).onclick = () => atualizarSaldo(jog.id, true);
                document.getElementById(`rem-${jog.id}`).onclick = () => atualizarSaldo(jog.id, false);
            });
        }

        // Envia as atualizações locais para os outros dispositivos na hora
        function salvarEEspalhar() {
            localStorage.setItem('bingo_dados_persistentes', JSON.stringify(jogadores));
            canalSincronismo.postMessage(jogadores);
        }

        // Escuta atualizações de outros navegadores abertos no mesmo jogo
        canalSincronismo.onmessage = (evento) => {
            if (evento.data) {
                jogadores = evento.data;
                localStorage.setItem('bingo_dados_persistentes', JSON.stringify(jogadores));
                renderizar();
            }
        };

        function tirarFoto(id) {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');

            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
            .then(stream => {
                video.srcObject = stream;
                setTimeout(() => {
                    context.drawImage(video, 0, 0, 300, 300);
                    const fotoBase64 = canvas.toDataURL('image/jpeg', 0.4);
                    stream.getTracks().forEach(track => track.stop());

                    const jog = jogadores.find(j => j.id === id);
                    jog.foto = fotoBase64;
                    
                    renderizar();
                    salvarEEspalhar();
                }, 800);
            })
            .catch(err => {
                alert("Por favor, permita o acesso à câmera para registrar a foto do jogador.");
            });
        }

        function atualizarSaldo(id, somar) {
            const campo = document.getElementById(`input-${id}`);
            const valor = parseFloat(campo.value);

            if (isNaN(valor) || valor <= 0) return;

            const jog = jogadores.find(j => j.id === id);
            const saldoAtual = Number(jog.saldo || 0);
            jog.saldo = somar ? saldoAtual + valor : saldoAtual - valor;

            campo.value = '';
            renderizar();
            salvarEEspalhar();
        }

        // Garante a montagem imediata na tela do Brave sem passar por validações externas de rede
        renderizar();
    </script>
</body>
</html>
