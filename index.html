<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BingoHeikiFM</title>
    <link rel="icon" type="image/png" href="bingo.png">
    <style>
        body { 
            font-family: Arial, sans-serif; 
            padding: 15px; 
            max-width: 950px; 
            margin: 0 auto; 
            background-image: url('bingo.png');
            background-repeat: repeat;
            background-size: 130px;
            background-attachment: fixed;
            background-color: rgba(244, 244, 249, 0.85);
            background-blend-mode: overlay;
        }
        h1 { 
            text-align: center; 
            color: #fff; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            background: rgba(0, 0, 0, 0.6);
            padding: 8px;
            border-radius: 8px;
            font-size: 1.6em;
            margin: 0 0 15px 0;
        }
        .grid-jogadores { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px; 
            margin-top: 10px; 
        }
        .card-jogador { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 16px; 
            border-radius: 12px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.15); 
            text-align: center; 
            position: relative;
        }
        .btn-reset {
            position: absolute;
            top: 8px;
            right: 8px;
            background: none;
            border: none;
            font-size: 1.1em;
            cursor: pointer;
            padding: 2px;
            opacity: 0.5;
            transition: opacity 0.2s, transform 0.2s;
        }
        .btn-reset:hover { opacity: 1; transform: scale(1.1); }
        
        .foto-wrapper { position: relative; width: 110px; height: 110px; margin: 0 auto 12px auto; }
        
        /* O object-fit: cover garante o corte perfeito e enquadramento circular */
        .foto-jogador { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; cursor: pointer; border: 2px solid #ccc; transition: transform 0.2s; }
        .foto-jogador:hover { transform: scale(1.05); border-color: #007bff; }
        
        .saldo { font-size: 1.5em; font-weight: bold; margin-bottom: 12px; color: #333; }
        .controles { display: flex; gap: 8px; justify-content: center; }
        input[type="number"] { width: 95px; padding: 5px; border: 1px solid #ddd; border-radius: 6px; text-align: center; font-size: 1em; }
        button.btn-add { padding: 5px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; background-color: #2e7d32; font-size: 1em; }
        
        /* Input invisível para acionar a galeria/câmera nativa */
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <h1>BingoHeikiFM</h1>
    <div class="grid-jogadores" id="hub-jogadores"></div>

    <!-- Input oculto global para gerenciamento de arquivos -->
    <input type="file" id="upload-foto" accept="image/*">

    <script>
        const ID_PROJETO = "layvcugosxjgaxapxoir";
        const SUPABASE_URL = "https://" + ID_PROJETO + ".supabase.co";
        const SUPABASE_KEY = "sb_publishable_2lSXqjX0BhyZQbQeWPnDZA_DDBb6L7m";
        const FOTO_PADRAO = "bingo.png";

        let jogadores = Array.from({ length: 6 }, function(_, i) {
            return { id: i + 1, foto: FOTO_PADRAO, saldo: 0 };
        });

        let jogadorSelecionadoParaFoto = null;

        function renderizar() {
            const hub = document.getElementById('hub-jogadores');
            hub.innerHTML = '';

            jogadores.forEach(jog => {
                const card = document.createElement('div');
                card.className = 'card-jogador';
                card.innerHTML = `
                    <button class="btn-reset" id="reset-${jog.id}" title="Zerar jogador">🗑️</button>
                    <div class="foto-wrapper">
                        <img src="${jog.foto || FOTO_PADRAO}" class="foto-jogador" title="Alterar foto (Câmera ou Galeria)" id="img-${jog.id}">
                    </div>
                    <div class="saldo">R$ ${Number(jog.saldo || 0).toFixed(2)}</div>
                    <div class="controles">
                        <input type="number" id="input-${jog.id}" placeholder="0" step="1">
                        <button class="btn-add" id="add-${jog.id}">Adicionar</button>
                    </div>
                `;
                hub.appendChild(card);

                document.getElementById(`img-${jog.id}`).onclick = function() { acionarSelecaoFoto(jog.id); };
                document.getElementById(`add-${jog.id}`).onclick = function() { atualizarSaldo(jog.id); };
                document.getElementById(`reset-${jog.id}`).onclick = function() { zerarJogador(jog.id); };
            });
        }

        async function carregarDadosNuvem() {
            try {
                const resposta = await fetch(SUPABASE_URL + "/rest/v1/jogadores?select=*&order=id.asc", {
                    headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY }
                });
                const dados = await resposta.json();
                if (dados && dados.length > 0) {
                    jogadores = dados;
                    renderizar();
                } else {
                    await inicializarTabelaNuvem();
                }
            } catch (err) {
                console.error("Erro ao carregar dados do Supabase:", err);
            }
        }

        async function inicializarTabelaNuvem() {
            try {
                await fetch(SUPABASE_URL + "/rest/v1/jogadores", {
                    method: 'POST',
                    headers: { 
                        "apikey": SUPABASE_KEY, 
                        "Authorization": "Bearer " + SUPABASE_KEY, 
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(jogadores)
                });
            } catch (err) {
                console.error("Erro ao inicializar registros:", err);
            }
        }

        async function enviarDadosNuvem(id) {
            try {
                const jog = jogadores.find(j => j.id === id);
                await fetch(SUPABASE_URL + "/rest/v1/jogadores?id=eq." + id, {
                    method: 'PATCH',
                    headers: { 
                        "apikey": SUPABASE_KEY, 
                        "Authorization": "Bearer " + SUPABASE_KEY, 
                        "Content-Type": "application/json" 
                    },
                    body: JSON.stringify({ foto: jog.foto, saldo: jog.saldo })
                });
            } catch (err) {
                console.error("Erro ao atualizar registro na nuvem:", err);
            }
        }

        function acionarSelecaoFoto(id) {
            jogadorSelecionadoParaFoto = id;
            // Abre as opções nativas do aparelho (Tirar Foto ou Escolher Arquivo)
            document.getElementById('upload-foto').click();
        }

        // Processa o arquivo selecionado ou a foto tirada
        document.getElementById('upload-foto').onchange = function(evento) {
            const arquivo = evento.target.files[0];
            if (!arquivo || jogadorSelecionadoParaFoto === null) return;

            const leitor = new FileReader();
            leitor.onload = function(e) {
                const imgTemp = new Image();
                imgTemp.onload = async function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // Força o corte quadrado perfeito (300x300) independente da proporção original da foto
                    canvas.width = 300;
                    canvas.height = 300;
                    
                    const menorLado = Math.min(imgTemp.width, imgTemp.height);
                    const sx = (imgTemp.width - menorLado) / 2;
                    const sy = (imgTemp.height - menorLado) / 2;
                    
                    ctx.drawImage(imgTemp, sx, sy, menorLado, menorLado, 0, 0, 300, 300);
                    const fotoBase64 = canvas.toDataURL('image/jpeg', 0.25);

                    const jog = jogadores.find(j => j.id === jogadorSelecionadoParaFoto);
                    jog.foto = fotoBase64;
                    
                    renderizar();
                    await enviarDadosNuvem(jogadorSelecionadoParaFoto);
                    jogadorSelecionadoParaFoto = null;
                };
                imgTemp.src = e.target.result;
            };
            leitor.readAsDataURL(arquivo);
            evento.target.value = ''; // Limpa o input para permitir novas seleções
        };

        async function atualizarSaldo(id) {
            const campo = document.getElementById(`input-${id}`);
            const valor = parseFloat(campo.value);

            if (isNaN(valor) || valor === 0) return;

            const jog = jogadores.find(j => j.id === id);
            const saldoAtual = Number(jog.saldo || 0);
            jog.saldo = saldoAtual + valor;

            campo.value = '';
            renderizar();
            await enviarDadosNuvem(id);
        }

        async function zerarJogador(id) {
            if (!confirm("Tem certeza que deseja zerar os dados deste jogador?")) return;
            
            const jog = jogadores.find(j => j.id === id);
            jog.foto = FOTO_PADRAO;
            jog.saldo = 0;
            
            renderizar();
            await enviarDadosNuvem(id);
        }

        renderizar();
        carregarDadosNuvem();
        setInterval(carregarDadosNuvem, 10000);
    </script>
</body>
</html>
