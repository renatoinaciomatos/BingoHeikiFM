<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BingoHeikiFM</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; padding: 20px; max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; color: #333; }
        .grid-jogadores { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-top: 20px; }
        .card-jogador { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .foto-wrapper { position: relative; width: 120px; height: 120px; margin: 0 auto 15px auto; }
        .foto-jogador { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; cursor: pointer; border: 3px solid #ccc; transition: transform 0.2s; }
        .foto-jogador:hover { transform: scale(1.05); border-color: #007bff; }
        .saldo { font-size: 1.6em; font-weight: bold; margin-bottom: 15px; color: #333; }
        .controles { display: flex; gap: 8px; justify-content: center; }
        input[type="number"] { width: 90px; padding: 6px; border: 1px solid #ddd; border-radius: 6px; text-align: center; }
        button { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; }
        .btn-add { background-color: #2e7d32; }
        .btn-rem { background-color: #c62828; }
        video, canvas { display: none; }
    </style>

    <!-- Bibliotecas globais do Firebase -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
</head>
<body>

    <h1>BingoHeikiFM</h1>
    <div class="grid-jogadores" id="hub-jogadores"></div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" width="300" height="300"></canvas>

    <script>
        // Configuração leve para o banco de dados de valores
        const firebaseConfig = {
            databaseURL: "https://firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const dbRef = database.ref('bingo_valores');

        const fotoPadrao = "bingo.png";
        
        // Estado local dos jogadores
        let jogadores = Array.from({ length: 6 }, (_, i) => ({ id: i + 1, saldo: 0 }));

        // Escuta os valores de dinheiro compartilhados na nuvem
        dbRef.on('value', (snapshot) => {
            const dadosSincronizados = snapshot.val();
            if (dadosSincronizados) {
                jogadores.forEach((jog, index) => {
                    if (dadosSincronizados[index]) {
                        jog.saldo = dadosSincronizados[index].saldo;
                    }
                });
            } else {
                // Envia dados zerados iniciais se a nuvem estiver limpa
                dbRef.set(jogadores.map(j => ({ id: j.id, saldo: j.saldo })));
            }
            renderizar();
        });

        function renderizar() {
            const hub = document.getElementById('hub-jogadores');
            hub.innerHTML = '';

            jogadores.forEach(jog => {
                // Recupera a foto salva no aparelho local ou usa a foto padrão do bingo
                const fotoSalvaLocal = localStorage.getItem(`foto_jogador_${jog.id}`) || fotoPadrao;

                const card = document.createElement('div');
                card.className = 'card-jogador';
                
                card.innerHTML = `
                    <div class="foto-wrapper">
                        <img src="${fotoSalvaLocal}" class="foto-jogador" title="Clique para tirar foto com a câmera" id="img-${jog.id}">
                    </div>
                    <div class="saldo">R$ ${jog.saldo.toFixed(2)}</div>
                    <div class="controles">
                        <input type="number" id="input-${jog.id}" placeholder="0,00" step="0.01">
                        <button class="btn-add" id="add-${jog.id}">Adicionar</button>
                        <button class="btn-rem" id="rem-${jog.id}">-</button>
                    </div>
                `;
                hub.appendChild(card);

                document.getElementById(`img-${jog.id}`).onclick = () => tirarFoto(jog.id);
                document.getElementById(`add-${jog.id}`).onclick = () => atualizarSaldo(jog.id, true);
                document.getElementById(`rem-${jog.id}`).onclick = () => atualizarSaldo(jog.id, false);
            });
        }

        function tirarFoto(id) {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');

            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
            .then(stream => {
                video.srcObject = stream;
                
                setTimeout(() => {
                    context.drawImage(video, 0, 0, 300, 300);
                    const fotoBase64 = canvas.toDataURL('image/jpeg', 0.5); // Comprime a foto de forma otimizada
                    
                    stream.getTracks().forEach(track => track.stop());

                    // Salva a imagem com segurança no armazenamento do aparelho do usuário atual
                    localStorage.setItem(`foto_jogador_${id}`, fotoBase64);
                    renderizar();
                }, 800);
            })
            .catch(err => {
                alert("Por favor, dê permissão de acesso à câmera no seu navegador.");
                console.error(err);
            });
        }

        function atualizarSaldo(id, somar) {
            const campo = document.getElementById(`input-${id}`);
            const valor = parseFloat(campo.value);

            if (isNaN(valor) || valor <= 0) return;

            const jog = jogadores.find(j => j.id === id);
            jog.saldo = somar ? jog.saldo + valor : jog.saldo - valor;

            campo.value = '';
            
            // Sincroniza apenas a tabela leve de saldos com todos os jogadores conectados
            dbRef.set(jogadores.map(j => ({ id: j.id, saldo: j.saldo })));
        }
    </script>
</body>
</html>
